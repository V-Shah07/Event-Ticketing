# Docker Compose is the real deployment target for this project.
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  analytics:
    build:
      context: .
      args:
        TARGET: ./cmd/analytics
    environment:
      REDIS_ADDR: redis:6379
      GRPC_ADDR: ":9100"
    ports:
      - "9100:9100"
    depends_on:
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      args:
        TARGET: ./cmd/api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ticketing?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-jwt-secret-change-me}
      TICKET_SECRET: ${TICKET_SECRET:-dev-insecure-ticket-secret-change-me}
      HTTP_ADDR: ":8080"
      ANALYTICS_ADDR: analytics:9100
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics:
        condition: service_started

volumes:
  pgdata:
