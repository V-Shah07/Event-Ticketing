name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketing"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketing?sslmode=disable
      REDIS_ADDR: localhost:6379
      JWT_SECRET: test-secret
      TICKET_SECRET: test-ticket-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Verify formatting
        run: |
          fmt_out=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$fmt_out" ]; then
            echo "These files are not gofmt-clean:"; echo "$fmt_out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -v -count=1
