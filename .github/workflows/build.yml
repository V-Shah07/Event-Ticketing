name: build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketing"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      kafka:
        image: apache/kafka:3.7.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ticketing?sslmode=disable
      REDIS_ADDR: localhost:6379
      KAFKA_BROKERS: localhost:9092
      JWT_SECRET: test-secret
      TICKET_SECRET: test-ticket-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Verify formatting
        run: |
          fmt_out=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))
          if [ -n "$fmt_out" ]; then
            echo "These files are not gofmt-clean:"; echo "$fmt_out"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -v -count=1

  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install terraform, kubeconform, helm
        run: |
          set -euo pipefail
          curl -sSL -o tf.zip https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip
          unzip -q tf.zip && sudo mv terraform /usr/local/bin/
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar -xz
          sudo mv kubeconform /usr/local/bin/
          curl -sSL https://get.helm.sh/helm-v3.16.3-linux-amd64.tar.gz | tar -xz
          sudo mv linux-amd64/helm /usr/local/bin/

      - name: terraform validate (never applied)
        run: |
          terraform -chdir=infra/terraform init -backend=false -input=false
          terraform -chdir=infra/terraform fmt -check
          terraform -chdir=infra/terraform validate

      - name: kubeconform k8s manifests
        run: kubeconform -strict -summary infra/k8s/*.yaml

      - name: helm lint + template validation
        run: |
          helm lint infra/helm/event-ticketing
          helm template et infra/helm/event-ticketing | kubeconform -strict -summary

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build thin dashboard
        working-directory: frontend
        run: |
          npm ci
          npm run build
