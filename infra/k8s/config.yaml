apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: event-ticketing
data:
  HTTP_ADDR: ":8080"
  GRPC_ADDR: ":9100"
  ANALYTICS_ADDR: "analytics:9100"
  REDIS_ADDR: "event-ticketing-redis:6379"
  KAFKA_BROKERS: "event-ticketing-kafka:9092"
  QR_DIR: "/data/qr"
---
# Placeholder secret. Real values are injected from AWS Secrets Manager /
# ExternalSecrets in a live cluster — never committed.
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: event-ticketing
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:CHANGE_ME@event-ticketing-postgres:5432/ticketing?sslmode=require"
  JWT_SECRET: "CHANGE_ME"
  TICKET_SECRET: "CHANGE_ME"
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
